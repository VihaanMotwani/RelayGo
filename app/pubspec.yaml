name: relaygo
description: "Offline-first emergency response app with BLE mesh networking"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # On-device AI
  cactus: ^0.2.7

  # BLE
  flutter_blue_plus: ^1.35.3
  ble_peripheral: ^2.4.0

  # Audio
  record: ^5.2.1

  # Location
  geolocator: ^13.0.2

  # Storage
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.5

  # Networking
  http: ^1.3.0
  connectivity_plus: ^6.1.4

  # State management
  provider: ^6.1.4

  # Utilities
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/knowledge/
